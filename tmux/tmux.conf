# Config
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g detach-on-destroy off

## Start windows & panes at 1
set -g base-index 1 
set -g pane-base-index 1 
set-window-option -g pane-base-index 1 
set-option -g renumber-windows on

## Open new pane in CWD
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

## Open claude in a new window. `jmux claude` handles auto-pair with nvim
## and resumes the most recent session for cwd on the first window only.
bind a new-window -n claude -c "#{pane_current_path}" "jmux claude"

## Sessionizer (jmux)
bind-key f run-shell "tmux neww ~/.config/scripts/jmux/bin/jmux"
bind-key F run-shell "tmux neww ~/.config/scripts/jmux/bin/jmux workspace"
bind-key t run-shell "tmux neww ~/.config/scripts/jmux/bin/jmux worktree add"
bind-key T run-shell "tmux neww ~/.config/scripts/jmux/bin/jmux worktree remove"
bind-key p run-shell "tmux neww ~/.config/scripts/jmux/bin/jmux pr"
bind-key P run-shell "tmux neww ~/.config/scripts/jmux/bin/jmux pr ."

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'aserowy/tmux.nvim'
set -g @plugin 'tmux-plugins/tmux-yank'

## Color Scheme
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @minimal-tmux-bg "#C5C9C7"
set -g @minimal-tmux-right false

## jmux status multibox: claude sessions waiting for input, clickable.
## With @minimal-tmux-right false the -extra content is the entire right side.
set -g @minimal-tmux-status-right-extra "#{E:@jmux_statusbox}"

run '~/.tmux/plugins/tpm/tpm'

## jmux multibox plumbing. User ranges fire MouseDown1Status (same key as the
## window list), so the fallback must stay the stock window-switch binding.
set -g status-right-length 60
set -g @jmux_statusbox ""
bind-key -T root MouseDown1Status {
  if -F '#{m:jmux-*,#{mouse_status_range}}' {
    run-shell -b "jmux statusline click '#{mouse_status_range}' '#{client_name}'"
  } {
    switch-client -t =
  }
}
## Repopulate the box from the persisted tag store on server start / reload.
run-shell -b "~/.config/scripts/jmux/bin/jmux statusline render"
