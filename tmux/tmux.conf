# Config
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ",xterm-256color:Tc"
set -g mouse on

## Start windows & panes at 1
set -g base-index 1 
set -g pane-base-index 1 
set-window-option -g pane-base-index 1 
set-option -g renumber-windows on

## Open new pane in CWD
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

## Open claude in a new window
## - First claude window in session: resume most recent session for cwd, or start fresh
## - Subsequent presses: always start a fresh session
bind a if-shell "tmux list-windows -t '#{session_name}' -F '##{window_name}' | grep -qx claude" \
    'new-window -n claude -c "#{pane_current_path}" "claude"' \
    'new-window -n claude -c "#{pane_current_path}" "claude --continue || claude"'

## Sessionizer (jmux)
bind-key -r f run-shell "tmux neww ~/.config/scripts/jmux/bin/jmux"
bind-key -r F run-shell "tmux neww ~/.config/scripts/jmux/bin/jmux worktree"
bind-key -r t run-shell "tmux neww ~/.config/scripts/jmux/bin/jmux worktree add"
bind-key -r T run-shell "tmux neww ~/.config/scripts/jmux/bin/jmux worktree remove"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'aserowy/tmux.nvim'
set -g @plugin 'tmux-plugins/tmux-yank'

## Color Scheme
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @minimal-tmux-bg "#cdd6f4"
set -g @minimal-tmux-right false

run '~/.tmux/plugins/tpm/tpm'
